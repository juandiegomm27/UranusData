<!DOCTYPE html>
<html lang="es">
<body>
  <header class="main-header">
    <div class="menu-container">
      
      <!-- Bloque Izquierdo: Logo -->
      <a href="#" class="logo">
        <img src="logo-todoNegro.png" alt="Logo" class="logo-img">
      </a>

      <!-- Hamburguesa para Móviles -->
      <input type="checkbox" id="menu-toggle" class="menu-checkbox">
      <label for="menu-toggle" class="menu-icono-btn">
        <img class="menu-icono" src="menu.png" alt="Menu">
      </label>

      <!-- Bloque Central: Navegación Principal -->
      <nav class="navbar">
        <ul>
          <li><a href="#" class="nav-link">inicio</a></li>
          <li><a href="#" class="nav-link">contacto</a></li>
        </ul>
      </nav>

      <!-- Bloque Derecho: Acciones (Tu Switch de Angular + Menú Usuario) -->
      <div class="header-actions">
        
        <!-- Comunicador de cambio de color -->
        <label class="switch-modo">
          <input type="checkbox" (change)="cambiarModo()">
            Modo Oscuro
        </label>

        <!-- Contenedor del Usuario (Dropdown Estilizado) -->
        <div class="usuario-dropdown">
          <div class="usuario-trigger">
            <img src="icon-usuario.png" id="icon-usuario" alt="Usuario" class="avatar-img">
          </div>
          
          <!-- Menú desplegable flotante basado en tu HTML original -->
          <div class="usuario-menu-desplegable">
            <div class="dropdown-header">
              <span class="user-name">nombre</span>
            </div>
            <ul class="dropdown-links">
              <li><a href="#">Ajustes</a></li>
              <li><a href="#">Preguntas frecuentes</a></li>
              <li><a href="#">Notificaciones</a></li>
            </ul>
            <div class="dropdown-footer">
              <a href="#" id="vaciar-carrito" class="btn-clear">Salir de la sesión</a>
            </div>
          </div>
        </div>

      </div>

    </div>
  </header>
</body>
</html>
