<main class="auth-section">
  <div class="auth-card" style="max-width: 600px; text-align: center; padding: 60px 40px;">

    <div class="brand-badge" style="margin-bottom: 20px;">
      <img src="logoSIH.png" alt="Logo" class="badge-img">
    </div>

    <h1 class="auth-title" style="font-size: 28px;">🚧 {{ nombreModulo }}</h1>

    <p style="font-size: 18px; opacity: 0.85; margin: 20px 0; line-height: 1.5;">
      Este módulo está en construcción. Estará disponible una vez se complete la conexión con la base de datos.
    </p>

    <div class="auth-footer-links" style="margin-top: 30px;">
      <a (click)="irAlInicio()" style="cursor: pointer;" class="footer-link">
        Regresar al inicio
      </a>
    </div>

  </div>
</main>
